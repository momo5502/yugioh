<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yu-Gi-Oh! Card Gallery</title>
    <link rel="preconnect" href="https://images.ygoprodeck.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav id="toolbar" class="toolbar" aria-label="Card controls">
        <button id="toolbar-handle" class="toolbar-handle" type="button" aria-expanded="true">
          Filters
        </button>

        <div class="toolbar-panel">
          <div class="toolbar-row toolbar-controls">
            <label class="control control-search">
              <span>Search</span>
              <input id="search-input" type="search" placeholder="Search by name or effect..." autocomplete="off" />
            </label>

            <label class="control">
              <span>Card kind</span>
              <select id="kind-select">
                <option value="all">All</option>
                <option value="monster">Monster</option>
                <option value="spell">Spell</option>
                <option value="trap">Trap</option>
                <option value="token">Token</option>
                <option value="skill">Skill</option>
              </select>
            </label>

            <label class="control">
              <span>Monster race</span>
              <select id="monster-type-select">
                <option value="all">All</option>
                <option value="aqua">Aqua</option>
                <option value="beast">Beast</option>
                <option value="beastwarrior">Beast-Warrior</option>
                <option value="creatorgod">Creator-God</option>
                <option value="cyberse">Cyberse</option>
                <option value="dinosaur">Dinosaur</option>
                <option value="divinebeast">Divine-Beast</option>
                <option value="dragon">Dragon</option>
                <option value="fairy">Fairy</option>
                <option value="fiend">Fiend</option>
                <option value="fish">Fish</option>
                <option value="illusion">Illusion</option>
                <option value="insect">Insect</option>
                <option value="machine">Machine</option>
                <option value="plant">Plant</option>
                <option value="psychic">Psychic</option>
                <option value="pyro">Pyro</option>
                <option value="reptile">Reptile</option>
                <option value="rock">Rock</option>
                <option value="seaserpent">Sea Serpent</option>
                <option value="spellcaster">Spellcaster</option>
                <option value="thunder">Thunder</option>
                <option value="warrior">Warrior</option>
                <option value="wingedbeast">Winged Beast</option>
                <option value="wyrm">Wyrm</option>
                <option value="zombie">Zombie</option>
              </select>
            </label>

            <label class="control">
              <span>Attribute</span>
              <select id="attribute-select">
                <option value="all">All</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="fire">Fire</option>
                <option value="water">Water</option>
                <option value="wind">Wind</option>
                <option value="earth">Earth</option>
                <option value="divine">Divine</option>
              </select>
            </label>

            <label class="control">
              <span>Spell/Trap subtype</span>
              <select id="subcategory-select">
                <option value="all">All</option>
                <option value="normal">Normal</option>
                <option value="continuous">Continuous</option>
                <option value="equip">Equip</option>
                <option value="quickplay">Quick-Play</option>
                <option value="field">Field</option>
                <option value="ritual">Ritual</option>
                <option value="counter">Counter</option>
              </select>
            </label>

            <label class="control">
              <span>Sort by</span>
              <select id="sort-select">
                <option value="default">Default</option>
                <option value="name">Name</option>
                <option value="atk">ATK</option>
                <option value="def">DEF</option>
                <option value="level">Level</option>
                <option value="rank">Rank</option>
                <option value="scale">Scale</option>
                <option value="password">Password</option>
                <option value="id">ID</option>
              </select>
            </label>

            <label class="control control-order">
              <span>Order</span>
              <select id="order-select">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
              </select>
            </label>

            <button id="reset-button" class="reset-button" type="button">Reset</button>
          </div>
        </div>
      </nav>

      <main>
        <section class="gallery-section">
          <div id="cards-grid" class="cards-grid" aria-live="polite"></div>
          <div id="empty-state" class="empty-state hidden"></div>
          <div id="load-sentinel" class="load-sentinel" aria-hidden="true"></div>
          <div id="loading-indicator" class="loading-indicator">Loading more cards…</div>
        </section>
      </main>
    </div>

    <aside id="card-hover-popup" class="card-hover-popup hidden" aria-hidden="true"></aside>

    <script src="./script.js" defer></script>
  </body>
</html>
